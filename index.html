<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tactical Drug Intelligence — Role 1/2 · SOF · CCATT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#eef2f7;
  --border:#d4dde8;--border2:#a8bdd0;
  --text:#1c2e3e;--text2:#3a5a78;--text3:#7a9ab8;
  --blue:#1565c0;--blue-bg:#e3f0ff;--blue-dim:#bbd6f8;
  --red:#c62828;--red-bg:#fdecea;
  --orange:#bf5000;--orange-bg:#fff3e0;
  --green:#1b6e3a;--green-bg:#e8f5ee;
  --purple:#6200ea;--purple-bg:#f3e5ff;
  --teal:#00695c;--teal-bg:#e0f2f0;
  --yellow:#7a5f00;--yellow-bg:#fff8e1;
  --pink:#ad1457;--pink-bg:#fce4ec;

  /* LEVEL COLORS */
  --r12:#bf4000;--r12-bg:#fff0e6;--r12-dim:#ffd4b8;
  --sof:#5200a8;--sof-bg:#f0e8ff;--sof-dim:#d8c0f8;
  --ccatt:#00695c;--ccatt-bg:#e0f4f1;--ccatt-dim:#b0ddd8;
  --all-lvl:#1565c0;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}

.layout{display:grid;grid-template-columns:240px 1fr 280px;height:100vh}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg3)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:transparent;border:2px solid var(--r12);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--r12);letter-spacing:-.5px;flex-shrink:0;position:relative}
.logo::after{content:'';position:absolute;inset:2px;border:1px solid var(--r12);opacity:.3;border-radius:2px}
.app-title{font-size:12px;font-weight:700;color:#1c2e3e;letter-spacing:.06em;text-transform:uppercase}
.app-sub{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.sidebar-body{flex:1;overflow-y:auto;padding:10px}
.sidebar-body::-webkit-scrollbar{width:3px}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* LEVEL FILTER TABS */
.lvl-tabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px;margin-bottom:10px}
.lvl-tab{padding:5px 4px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;text-align:center;border:1px solid var(--border);background:var(--bg3);color:var(--text3);transition:all .12s;user-select:none}
.lvl-tab.active-all{background:#e3f0ff;color:#1565c0;border-color:#1565c0}
.lvl-tab.active-r12{background:#fff0e6;color:#bf4000;border-color:#bf4000}
.lvl-tab.active-sof{background:#f0e8ff;color:#5200a8;border-color:#5200a8}
.lvl-tab.active-ccatt{background:#e0f4f1;color:#00695c;border-color:#00695c}
.lvl-tab:hover{filter:brightness(1.3)}

.sec-label{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:10px 0 4px;padding:0 2px;font-weight:700}
.sec-label:first-child{margin-top:0}
.cat-btn{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--text2);transition:all .12s;margin-bottom:2px;user-select:none;font-family:'Segoe UI',system-ui,sans-serif}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:#e3f0ff;color:#1565c0;border-left:3px solid #1565c0}
.cat-dot{width:6px;height:6px;border-radius:1px;flex-shrink:0}
.cat-count{margin-left:auto;font-size:9px;color:var(--text3)}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:7px 8px;text-align:center;cursor:pointer;transition:all .15s}
.stat-box:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-1px)}
.stat-box.active{background:var(--blue-bg);border-color:var(--blue-dim)}
.stat-box.active .stat-num{color:var(--blue)}
.stat-box.active .stat-label{color:var(--blue)}
.stat-num{font-size:18px;font-weight:700;color:var(--blue);font-family:'Segoe UI',system-ui,sans-serif}
.stat-label{font-size:8px;color:var(--text3);margin-top:1px;letter-spacing:.06em;text-transform:uppercase}

.scen-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:10px;color:var(--text3);transition:all .12s;margin-bottom:2px;border:1px solid transparent;font-family:'Segoe UI',system-ui,sans-serif}
.scen-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.scen-icon{font-size:11px;flex-shrink:0}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.mode-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.mode-btn{padding:6px 10px;font-size:10px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .1s;white-space:nowrap;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.04em;text-transform:uppercase}
.mode-btn.active{background:var(--bg4);color:var(--blue);border-right:1px solid var(--border)}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;padding:7px 32px 7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none;font-family:'Segoe UI',system-ui,sans-serif;transition:border-color .12s}
.search-input:focus{border-color:var(--border2)}
.search-input::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;display:none}
.btn{padding:6px 12px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:10px;white-space:nowrap;transition:all .12s;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.04em;text-transform:uppercase}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-ai{border-color:var(--blue-dim);color:var(--blue);background:var(--blue-bg)}
.btn-tccc{border-color:var(--r12-dim);color:var(--r12);background:var(--r12-bg);text-decoration:none;display:inline-flex;align-items:center}

.results{flex:1;overflow-y:auto;padding:12px}
.results::-webkit-scrollbar{width:4px}
.results::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;font-family:'Segoe UI',system-ui,sans-serif}
.results-count{color:var(--blue)}

/* ── AI PANEL ── */
.ai-panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ai-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg3)}
.ai-title{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;font-family:'Segoe UI',system-ui,sans-serif}
.ai-status{font-size:9px;color:var(--text3);font-family:'Segoe UI',system-ui,sans-serif}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
.ai-dot.pulse{background:var(--blue);animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ai-body{flex:1;overflow-y:auto;padding:10px;font-size:11px;line-height:1.7;color:var(--text2);font-family:'Segoe UI',system-ui,sans-serif}
.ai-body::-webkit-scrollbar{width:3px}
.ai-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.ai-placeholder{color:var(--text3);font-size:11px;line-height:1.6;font-style:normal}
.ai-placeholder::before{content:'> ';color:var(--blue)}

/* ── LEVEL BADGES ── */
.lvl-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;font-family:'Segoe UI',system-ui,sans-serif}
.lvl-r12{background:#fff0e6;color:#bf4000;border:1px solid #f0c0a0}
.lvl-sof{background:#f0e8ff;color:#5200a8;border:1px solid #d0b8f8}
.lvl-ccatt{background:#e0f4f1;color:#00695c;border:1px solid #80d0c8}
.lvl-all{background:#e3f0ff;color:#1565c0;border:1px solid #90c0f0}

/* ── DRUG CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 12px;cursor:pointer;transition:all .12s;margin-bottom:7px;position:relative}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px;background:var(--border)}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.open{border-color:var(--blue-dim);background:var(--bg3)}
.card.level-r12::before{background:var(--r12)}
.card.level-sof::before{background:var(--sof)}
.card.level-ccatt::before{background:var(--ccatt)}
.card.level-all::before{background:linear-gradient(180deg,var(--r12),var(--sof),var(--ccatt))}

.card-top{display:flex;align-items:flex-start;gap:9px}
.card-icon{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--border)}
.card-left{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;color:#1c2e3e;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.02em}
.card-class{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Segoe UI',system-ui,sans-serif}
.card-primary{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.4}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ev-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.05em;text-transform:uppercase;font-family:'Segoe UI',system-ui,sans-serif}
.ev-strong{background:#e8f5ee;color:#1b6e3a;border:1px solid #a8d8b8}
.ev-moderate{background:#e3f0ff;color:#1565c0;border:1px solid #90c0f0}
.ev-emerging{background:#fff8e1;color:#7a5f00;border:1px solid #ffe082}
.ev-investigational{background:#f3e5ff;color:#6200ea;border:1px solid #d4a8f8}

.lvl-row{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.tag-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tag{font-size:9px;padding:1px 6px;border-radius:2px;font-weight:600;white-space:nowrap;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.03em}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-dim)}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid #a0d0b0}
.tag-orange{background:var(--orange-bg);color:var(--orange);border:1px solid #f0c090}
.tag-red{background:var(--red-bg);color:var(--red);border:1px solid #f0b0b0}
.tag-purple{background:var(--purple-bg);color:var(--purple);border:1px solid #d4a8f8}
.tag-teal{background:var(--teal-bg);color:var(--teal);border:1px solid #a0d8d0}
.tag-yellow{background:#fff8e1;color:#7a5f00;border:1px solid #ffe082}
.tag-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.tag-pink{background:#fce4ec;color:#ad1457;border:1px solid #f0a8c8}

/* ── CARD DETAIL ── */
.card-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.card.open .card-detail{display:block}
.mech-box{background:#e8f2ff;border:1px solid #b0d0f8;border-radius:3px;padding:8px 10px;margin-bottom:8px}
.mech-label{font-size:8px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:3px;font-family:'Segoe UI',system-ui,sans-serif}
.mech-text{font-size:11px;color:#1a4080;line-height:1.6;font-family:'Segoe UI',system-ui,sans-serif}
.det-block{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px 10px;margin-bottom:8px}
.det-label{font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;font-weight:700;font-family:'Segoe UI',system-ui,sans-serif}
.det-text{font-size:11px;color:var(--text2);line-height:1.6;font-family:'Segoe UI',system-ui,sans-serif}
.det-text ul{padding-left:12px}
.det-text li{margin-bottom:5px}

/* LEVEL CONTEXT BOXES */
.lvl-context{border-radius:3px;padding:7px 10px;margin-bottom:6px;font-size:10px;line-height:1.55;font-family:'Segoe UI',system-ui,sans-serif}
.lvl-context-r12{background:var(--r12-bg);border:1px solid var(--r12-dim);color:#8a3000}
.lvl-context-sof{background:var(--sof-bg);border:1px solid var(--sof-dim);color:#4a00a0}
.lvl-context-ccatt{background:var(--ccatt-bg);border:1px solid var(--ccatt-dim);color:#006050}
.lvl-context-label{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}

.shortage-title{font-size:8px;color:var(--orange);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:5px;font-family:'Segoe UI',system-ui,sans-serif}
.alt-card{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:7px 9px;margin-bottom:5px}
.alt-name{font-size:11px;font-weight:700;color:#1c2e3e;margin-bottom:2px;font-family:'Segoe UI',system-ui,sans-serif}
.alt-note{font-size:10px;color:var(--text3);line-height:1.4;font-family:'Segoe UI',system-ui,sans-serif}
.alt-caveat{font-size:9px;color:var(--orange);margin-top:2px;font-family:'Segoe UI',system-ui,sans-serif}
.warn-box{background:#fff0f0;border:1px solid #f5c0c0;border-radius:6px;padding:9px 12px;font-size:11px;color:#8b0000;line-height:1.55;margin-bottom:8px}
.warn-box strong{color:#c62828;font-weight:700}
.note-box{background:#fffbe6;border:1px solid #ffe082;border-radius:6px;padding:9px 12px;font-size:11px;color:#5a4000;line-height:1.55;margin-bottom:8px}
.card-actions{display:flex;gap:5px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)}
.act-btn{flex:1;padding:6px;font-size:10px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .1s;text-align:center;font-family:'Segoe UI',system-ui,sans-serif;letter-spacing:.03em;text-transform:uppercase}
.act-btn:hover{background:var(--bg4);color:var(--text)}
.act-btn.act-ai{border-color:var(--blue-dim);color:var(--blue);background:var(--blue-bg)}

.empty{text-align:center;padding:50px 20px;color:var(--text3);font-family:'Segoe UI',system-ui,sans-serif}
.empty-ico{font-size:32px;margin-bottom:10px}
.empty-msg{font-size:11px;line-height:1.7}
.empty-msg::before{content:'> ';color:var(--blue)}
/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;height:100vh}
  .sidebar{display:none;position:fixed;inset:0;z-index:100;width:280px;height:100vh}
  .sidebar.open{display:flex}
  .ai-panel{display:none;position:fixed;inset:0;z-index:100;width:100vw}
  .ai-panel.open{display:flex}
  .topbar{flex-wrap:wrap;gap:4px;padding:8px}
  .mode-toggle{order:2;width:100%}
  .mode-btn{flex:1;font-size:10px;padding:5px 4px}
  .search-wrap{order:3;width:100%}
  .btn{font-size:10px;padding:5px 8px}
  .btn-tccc{display:none}
  .mobile-menu-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text2);cursor:pointer;font-size:16px;flex-shrink:0}
  .mobile-ai-btn{display:flex;align-items:center;justify-content:center;padding:5px 10px;border:1px solid var(--blue-dim);border-radius:4px;background:var(--blue-bg);color:var(--blue);cursor:pointer;font-size:11px;flex-shrink:0}
  .mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .mobile-overlay.open{display:block}
  .mobile-close{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:18px;margin-left:auto}
  .sidebar-header{display:flex;align-items:center}
  .results{padding:10px}
  .card{padding:10px}
  .card-name{font-size:13px}
  .ai-header{padding:8px 12px}
  .ai-body{padding:12px}
}
@media (min-width: 769px) {
  .mobile-menu-btn,.mobile-ai-btn,.mobile-overlay,.mobile-close{display:none!important}
}
</style>
</head>
<body>
<div class="layout">

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-row">
      <div class="logo">Rx²</div>
      <div>
        <div class="app-title">Tactical Drug Intel</div>
        <div class="app-sub">Role 1/2 · SOF · CCATT</div>
      </div>
      <button class="mobile-close" onclick="toggleSidebar()">✕</button>
    </div>
  </div>
  <div class="sidebar-body">
    <div class="sec-label">Echelon Filter</div>
    <div class="lvl-tabs">
      <div class="lvl-tab active-all" id="tab-all" onclick="setLevel('all')">ALL</div>
      <div class="lvl-tab" id="tab-r12" onclick="setLevel('r12')">R1/2</div>
      <div class="lvl-tab" id="tab-sof" onclick="setLevel('sof')">SOF</div>
      <div class="lvl-tab" id="tab-ccatt" onclick="setLevel('ccatt')">CCATT</div>
    </div>

    <div class="sec-label">Statistics</div>
    <div class="stat-grid" id="statGrid"></div>

    <div class="sec-label" style="margin-top:10px;">Drug Category</div>
    <div id="catList"></div>

    <div class="sec-label" style="margin-top:10px;">Tactical Scenarios</div>
    <div id="scenList"></div>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">
  <div class="topbar">
    <div class="mobile-menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeDrug" onclick="setMode('drug')">Drug</button>
      <button class="mode-btn" id="modeSx" onclick="setMode('symptom')">Situation</button>
      <button class="mode-btn" id="modeMech" onclick="setMode('mech')">Mechanism</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Search drug, situation, or mechanism..." onkeydown="if(event.key==='Enter')doSearch()" oninput="onInput()"/>
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
    <button class="btn" onclick="doSearch()">Search</button>
    <button class="btn btn-ai" onclick="askAI()">AI ↗</button>
    <div class="mobile-ai-btn" onclick="toggleAIPanel()">AI ↗</div>
  </div>
  <div class="results" id="results"></div>
</div>

<!-- Mobile overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileAll()"></div>

<!-- ── AI PANEL ── -->
<div class="ai-panel">
  <div class="ai-header">
    <div class="ai-title">// AI Mechanistic Analysis</div>
    <div style="display:flex;align-items:center;gap:6px">
      <button onclick="testAI()" style="font-size:9px;padding:3px 8px;border:1px solid var(--border2);border-radius:3px;background:var(--bg4);color:var(--text2);cursor:pointer;">TEST</button>
      <div class="ai-status" id="aiStatus">STANDBY</div>
      <div class="ai-dot" id="aiDot"></div>
      <button class="mobile-close" onclick="toggleAIPanel()">✕</button>
    </div>
  </div>
  <div class="ai-body" id="aiBody">
    <div class="ai-placeholder">Select a drug and click "Deep Analysis" or use "AI ↗" for tactical shortage scenarios and dual-use research.</div>
  </div>
</div>

</div><!-- /layout -->

<script>
// ══════════════════════════════════════════════════════
// DRUG DATABASE — Multi-Echelon Tactical Formulary
// levels: 'r12' = Role 1/2, 'sof' = SOF/JSOC, 'ccatt' = CCATT, 'all' = all echelons
// ══════════════════════════════════════════════════════
const DB = [

// ════════════════════════════════════
// ANALGESICS / SEDATION
// ════════════════════════════════════
{
  id:'ketamine', name:'Ketamine', icon:'💉', cat:'analgesia',

// SEARCH
// ═══════════════════════════════════════════
function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q){renderAll();return;}
  let pool=DB;
  if(activeLevel!=='all')pool=pool.filter(d=>d.levels.includes(activeLevel));
  if(activeCat!=='all')pool=pool.filter(d=>d.cat===activeCat);
  const words=q.split(' ').filter(w=>w.length>1);
  
  // Score each drug: count how many query words match
  const scored=pool.map(d=>{
    const hay=[d.name,d.drug_class,d.primary_use,d.mechanism,
      ...d.dual_uses.map(u=>u.use+' '+u.note),
      ...d.tags,
      ...(d.shortage_alternatives||[]).map(a=>a.name+' '+a.note),
      ...(d.level_context?Object.values(d.level_context):[])]
      .join(' ').toLowerCase();
    // Boost name/primary matches
    const nameHay=(d.name+' '+d.primary_use+' '+d.tags.join(' ')).toLowerCase();
    const score=words.reduce((s,w)=>s+(hay.includes(w)?1:0)+(nameHay.includes(w)?1:0),0);
    return{d,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);

  const results=scored.map(x=>x.d);
  renderCards(results,`${results.length} result${results.length!==1?'s':''} — "${q}"`);
}
function renderAll(){
  let pool=DB;
  if(activeLevel!=='all')pool=pool.filter(d=>d.levels.includes(activeLevel));
  if(activeCat!=='all')pool=pool.filter(d=>d.cat===activeCat);
  const lvlLabel=activeLevel==='all'?'All Echelons':activeLevel.toUpperCase();
  renderCards(pool,`${pool.length} drugs — ${lvlLabel} · ${CATS[activeCat]?.label||'All'}`);
}

    return;
  }
  el.innerHTML=`<div class="results-header"><span class="results-count">${header}</span></div>`+list.map(cardHTML).join('');
}

  </li>`).join('');

  // Determine card level class
  const lvlClass = d.levels.length>1?'level-all':('level-'+d.levels[0]);

  return`<div class="card ${lvlClass}" id="card-${d.id}" onclick="toggleCard('${d.id}')">
  <div class="card-top">
    <div class="card-icon" style="background:${CATS[d.cat]?.color||'#1565c0'}22;color:${CATS[d.cat]?.color||'#4a9eff'}">${d.icon}</div>
    <div class="card-left">
      <div class="card-name">${d.name}</div>

    ${duals.length?`<div class="det-block"><div class="det-label">🔀 DUAL / ALTERNATIVE USES (MECHANISM-DERIVED)</div><div class="det-text"><ul style="padding-left:13px;">${allDuals}</ul></div></div>`:''}
    ${altCards?`<div style="margin-bottom:8px;"><div class="shortage-title">⚠ SHORTAGE ALTERNATIVES</div>${altCards}</div>`:''}

function toggleCard(id){

async function analyzeDrug(id){
  const d=DB.find(x=>x.id===id);if(!d)return;
  const lvlCtx=d.level_context?Object.entries(d.level_context).map(([l,t])=>`${l.toUpperCase()}: ${t}`).join('\n'):'';
  await streamAI(`You are a military combat medicine pharmacologist advising Role 1/2 medics, SOF 18D/IDC, and CCATT teams.

Drug: ${d.name}
Echelon levels: ${d.levels.join(', ')}
Class: ${d.drug_class}
Mechanism: ${d.mechanism}
Level context:\n${lvlCtx}
Known dual uses: ${d.dual_uses.map(u=>u.use).join('; ')}

Analyze for TACTICAL dual-use intelligence:
1. MECHANISTIC BASIS: Why does this drug have these dual uses? What molecular pathway enables each?
2. LEVEL-SPECIFIC VALUE: How does the dual-use potential differ between R1/2, SOF, and CCATT contexts?
3. UNDISCOVERED POTENTIAL: What other uses are mechanistically plausible for tactical medicine?
4. SHORTAGE PRIORITY: In an austere or supply-constrained environment, which uses of this drug are truly irreplaceable?
5. TRAINING PEARL: What is the single most important dual-use fact every medic at each level should know?

Be tactical, specific, and evidence-based.`);
}

async function findAlternatives(id){
  const d=DB.find(x=>x.id===id);if(!d)return;
  await streamAI(`You are a military medicine pharmacologist. ${d.name} is COMPLETELY UNAVAILABLE at an austere forward operating base.

Echelon: ${activeLevel==='all'?'All levels (R1/2, SOF, CCATT)':activeLevel.toUpperCase()}
Drug mechanism: ${d.mechanism}
Indications to cover: ${d.dual_uses.map(u=>u.use).join('; ')}

Create a TACTICAL SHORTAGE PROTOCOL:
For each indication:
1. Best available substitute from standard tactical formulary
2. Mechanistic basis (WHY does this substitute work?)
3. Dose and route for field use
4. Critical limitations that must be briefed to the medic
5. Any indication with NO acceptable substitute — flag as IMMEDIATE RESUPPLY PRIORITY

Format as a concise field protocol for a combat medic or 18D.`);
}

async function askAI(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){document.getElementById('aiBody').innerHTML='<div class="ai-placeholder">Enter a search query first.</div>';return;}
  const lvlStr=activeLevel==='all'?'all echelons (R1/2, SOF, CCATT)':activeLevel.toUpperCase();
  const drugNames=DB.filter(d=>activeLevel==='all'||d.levels.includes(activeLevel)).map(d=>d.name).join(', ');
  await streamAI(`You are a military combat medicine pharmacologist advising ${lvlStr} personnel.

QUERY: "${q}"
Available formulary (${lvlStr}): ${drugNames}

Provide TACTICAL MECHANISTIC INTELLIGENCE:
1. RELEVANT DRUGS: Which formulary drugs address this situation? Why (mechanistically)?
2. DUAL-USE CONNECTIONS: What mechanism-based dual uses apply to this scenario?
3. SHORTAGE PROTOCOL: If key drugs are unavailable, what is the cascade management?
4. LEVEL-SPECIFIC APPROACH: How does management differ between R1/2, SOF, and CCATT?
5. TRAINING VALUE: Key teaching points for medic education.

Be specific, evidence-based, and tactically relevant.`);
}

async function streamAI(prompt){
  const body=document.getElementById('aiBody'),dot=document.getElementById('aiDot'),status=document.getElementById('aiStatus');
  dot.classList.add('pulse');
  if(status) status.textContent='PROCESSING';
  body.innerHTML='<div style="color:var(--text2);font-size:12px;padding:8px;">분석 중...</div>';
  try{
    const res=await fetch('/.netlify/functions/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    if(!res.ok){
      const errText=await res.text();
      body.innerHTML=`<div style="color:#c62828;font-size:11px;padding:8px;background:#fff0f0;border-radius:4px;border:1px solid #f5c0c0;">
        <strong>API Error ${res.status}</strong><br>${errText.substring(0,200)}
      </div>`;
      dot.classList.remove('pulse');
      if(status) status.textContent='ERROR';
      return;
    }
    const data=await res.json();
    if(data.error){
      body.innerHTML=`<div style="color:#c62828;font-size:11px;padding:8px;background:#fff0f0;border-radius:4px;border:1px solid #f5c0c0;">
        <strong>Error:</strong> ${data.error.message||JSON.stringify(data.error)}
      </div>`;
      dot.classList.remove('pulse');
      if(status) status.textContent='ERROR';
      return;
    }
    const text=(data.content||[]).map(c=>c.text||'').join('');
    if(!text){
      body.innerHTML='<div style="color:var(--text3);font-size:11px;padding:8px;">응답을 받지 못했습니다. 다시 시도하세요.</div>';
    } else {
      body.innerHTML=text
        .replace(/^#{1,3} (.+)$/gm,'<div style="font-size:11px;font-weight:700;color:var(--blue);margin:12px 0 4px;">$1</div>')
        .replace(/^\d+\. \*\*(.+?)\*\*:?/gm,'<div style="font-size:11px;font-weight:700;color:var(--r12);margin:10px 0 3px;">$1</div>')
        .replace(/\*\*(.+?)\*\*/g,'<strong style="color:#1c2e3e;">$1</strong>')
        .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
    }
  }catch(e){
    body.innerHTML=`<div style="color:#8a6a00;font-size:11px;padding:8px;background:#fffbe6;border-radius:4px;border:1px solid #ffe082;">
      <strong>연결 오류:</strong> ${e.message}<br>
      <span style="font-size:10px;color:var(--text3);">claude.ai 환경에서 열면 AI 기능이 활성화됩니다.</span>
    </div>`;
  }
  dot.classList.remove('pulse');
  if(status) status.textContent='READY';
}

// ── TEST AI CONNECTION ──
async function testAI(){
  await streamAI('Reply with exactly this JSON only, no other text: {"status":"ok","model":"haiku"}');
}

// ── STAT FILTER ──
let activeStatFilter = null;
function statFilter(type){
  // Toggle off if same
  if(activeStatFilter === type){ activeStatFilter=null; renderAll(); clearStatActive(); return; }
  activeStatFilter = type;
  clearStatActive();
  const el = document.getElementById('stat-'+type);
  if(el) el.classList.add('active');

  let pool = DB;
  if(activeLevel!=='all') pool=pool.filter(d=>d.levels.includes(activeLevel));
  if(activeCat!=='all') pool=pool.filter(d=>d.cat===activeCat);

  if(type==='all'){
    renderCards(pool, `${pool.length} drugs — All`);
  } else if(type==='dual'){
    const sorted=[...pool].sort((a,b)=>b.dual_uses.length-a.dual_uses.length);
    renderCards(sorted, `${pool.length} drugs — sorted by most dual uses`);
  } else if(type==='strong'){
    const filtered=pool.filter(d=>d.ev_overall==='strong');
    renderCards(filtered, `${filtered.length} drugs — Strong Evidence only`);
  } else if(type==='alts'){
    const sorted=[...pool].sort((a,b)=>(b.shortage_alternatives||[]).length-(a.shortage_alternatives||[]).length);
    renderCards(sorted, `${pool.length} drugs — sorted by most alternatives`);
  }
  // Close mobile sidebar after selection
  if(window.innerWidth<=768) closeMobileAll();
}
function clearStatActive(){
  ['all','dual','strong','alts'].forEach(t=>{ const el=document.getElementById('stat-'+t); if(el) el.classList.remove('active'); });
}

// ── MOBILE FUNCTIONS ──
function toggleSidebar(){
  const s=document.querySelector('.sidebar');
  const o=document.getElementById('mobileOverlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function toggleAIPanel(){
  const p=document.querySelector('.ai-panel');
  const o=document.getElementById('mobileOverlay');
  // Also trigger AI analysis if search has query
  const q=document.getElementById('searchInput').value.trim();
  if(q && !p.classList.contains('open')) askAI();
  p.classList.toggle('open');
  o.classList.toggle('open');
}
function closeMobileAll(){
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.ai-panel').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('open');
}

renderAll();
